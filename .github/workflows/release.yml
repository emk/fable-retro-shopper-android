name: Build & publish latest APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Only the newest push matters for a rolling "latest" release.
concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Test and build signed release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:testDebugUnitTest assembleRelease

      - name: Publish rolling "latest" prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk retro-shopper.apk
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest retro-shopper.apk \
            --prerelease \
            --title "Latest build" \
            --notes "Automated build of ${GITHUB_SHA::7} ($(date -u +%Y-%m-%d)). Download retro-shopper.apk and open it on your phone to install (see the README's sideloading section)."
